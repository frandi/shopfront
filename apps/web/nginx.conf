# nginx config for the storefront container.
# Serves the static Vite build and reverse-proxies /api to the api service so the browser
# talks to a single origin (mirrors the Vite dev proxy; keeps the API CORS-free).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to the api container on the compose network.
    # No trailing slash on proxy_pass: the full original path (e.g. /api/health,
    # /api/products) is preserved, which is what the Express routes expect.
    location /api/ {
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown paths return index.html so client-side (react-router) routes resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
